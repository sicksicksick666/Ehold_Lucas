# --------------------------------------------------------------------------- #
#  GitHub Actions Workflow: Infrastruktur zerstören                           #
#                                                                             #
#  Trigger: nur manuell. Zusätzlich Confirmation-Gate, damit niemand          #
#  versehentlich auf "Run workflow" klickt und die VM wegfällt.               #
# --------------------------------------------------------------------------- #

name: Infra Destroy (Exoscale)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Bestätigung: tippe "destroy" um die Infrastruktur zu löschen'
        required: true
        default: 'no'

concurrency:
  group: terraform-exoscale
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Ehold_Lucas/Abgabe_2_260518/terraform

    env:
      EXOSCALE_API_KEY:    ${{ secrets.EXOSCALE_API_KEY }}
      EXOSCALE_API_SECRET: ${{ secrets.EXOSCALE_API_SECRET }}

      # Das SOS-State-Backend (backend.tf) authentifiziert sich über die
      # AWS-Standard-Env-Vars - hier mit DENSELBEN Exoscale-Credentials.
      AWS_ACCESS_KEY_ID:     ${{ secrets.EXOSCALE_API_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.EXOSCALE_API_SECRET }}
      AWS_DEFAULT_REGION:    at-vie-1

      TF_VAR_ssh_public_key:    ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_duckdns_subdomain: ${{ secrets.DUCKDNS_SUBDOMAIN }}
      TF_VAR_duckdns_token:     ${{ secrets.DUCKDNS_TOKEN }}

      TF_IN_AUTOMATION: "true"
      TF_INPUT: "0"

    steps:
      # ---------- 0. Confirm-Gate -------------------------------------- #
      - name: Bestätigung prüfen
        if: ${{ inputs.confirm != 'destroy' }}
        run: |
          echo "::error::Workflow abgebrochen – bitte 'destroy' im Eingabefeld eintippen."
          exit 1

      # ---------- 1. Code auschecken ----------------------------------- #
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------- 2. Terraform installieren ---------------------------- #
      - name: Terraform installieren
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      # ---------- 3. Init ---------------------------------------------- #
      # ---------- 2b. SOS State-Bucket sicherstellen ------------------- #
      # Das Remote-State-Backend (siehe terraform/backend.tf) benötigt den
      # Bucket, BEVOR `terraform init` läuft. Wir legen ihn idempotent an
      # (|| true -> kein Fehler, falls er bereits existiert). Die AWS-CLI ist
      # auf GitHub-Runnern vorinstalliert und spricht den SOS-Endpunkt an.
      - name: SOS State-Bucket sicherstellen
        run: |
          aws s3 mb "s3://ehold-vica-abgabe2-tfstate" \
            --endpoint-url https://sos-at-vie-1.exo.io \
            --region at-vie-1 || true

      - name: terraform init
        run: terraform init -input=false

      # ---------- 4. Destroy ------------------------------------------- #
      # -auto-approve weil wir bereits über das Input-Confirm-Gate
      # eine manuelle Bestätigung haben.
      - name: terraform destroy
        run: terraform destroy -input=false -auto-approve

      - name: Erfolgs-Notiz
        run: echo "::notice::Infrastruktur wurde erfolgreich entfernt."
